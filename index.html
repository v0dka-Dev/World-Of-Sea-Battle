<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="./leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: serif;
  background-color: #000000;
}

/* Layout: Map 80%, Panel 20% */
#container {
  display: flex;
  height: 100vh;
}

#map {
  flex: 8; /* 80% */

}

#exportBox {
  flex: 2; /* 20% */
  padding: 10px;
  background: #fff;
  box-shadow: -2px 0 5px rgba(0,0,0,0.2);
  overflow-y: auto;
}

/* Textarea inside panel */
textarea {
  width: 100%;
  height: 200px;
}

/* marker styles */
.townMarker {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #d2a34a;
  font-weight: bold;
  text-shadow: 0 0 2px black, 0 0 4px black;
  width: 60px;
}

.townMarker img {
  height: auto;
  display: block;
}

.townLabel {
  font-size: 14px;
  margin-top: 2px;
  width: 100%;
}

.navbar {
    color: #fff;
    background-color: #000000;
    max-width: 400px;
    text-align: center;
}
</style>
</head>

<body>
<div id="container">
  <div id="map"></div>
<div class="navbar">

<div id="trading">
    <div id="goodsFormContainer"></div>
</div>

<div id="exportBox" style="display: none">
    <button id="exportBtn">Export Markers</button>
    <br><br>
    <textarea id="output"></textarea>
    <!--<div id="goodsFormContainer"></div>-->
</div>
  
</div>

<script type="module">

import towns from './townsdata.js';


// ---------- DEBUG CONTROL ----------
let debugEnabled = false; // default: debug off


let selectedTown = null; // used in show goodsform func
let highlightedMarker = null; // used in highlightTownMarker func



// Enable debug via console command enableDebug() ->>> opens options for adding new towns by clicking, editing pricing and exporting town data
window.enableDebug = function() {
  debugEnabled = true;
  document.getElementById("exportBtn").disabled = false;
  document.getElementById("output").disabled = false;
  document.getElementById("exportBox").style.display = "block";
  console.log("Debug mode enabled: export & marker creation active.");
};

// Disable export button & textarea initially
document.getElementById("exportBtn").disabled = true;
document.getElementById("output").disabled = true;

// ---------- MAP SETUP ----------
const map = L.map('map', {
  crs: L.CRS.Simple,
  maxZoom: -1,
  minZoom: -1,
  zoomControl: false
});

const bounds = [[0,0],[1800,2500]];

L.imageOverlay(
  "./images/map.png",
  bounds
).addTo(map);

map.fitBounds(bounds);


const markers = [...towns];

// create a pane so i can load it behind the markers
map.createPane('backgroundPane');
map.getPane('backgroundPane').style.zIndex = 400; 


// --- make pvp static circle

const pvpPosition = [1370, 910]; 
const pvpFixed = L.marker(pvpPosition, {
  icon: L.divIcon({
    html: `
      <div style="
        width: 500px;
        height: 500px;
        background: repeating-linear-gradient(
          45deg,
          rgba(255,0,0,0.5),
          rgba(255,0,0,0.5) 10px,
          rgba(0,0,0,0.5) 10px,
          rgba(0,0,0,0.5) 20px
        );
        border: 2px solid red;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 200px;
        color: red;
        text-align: center;
        text-shadow: 1px 1px 2px black;
        opacity: 0.3;
      ">PVP</div>
    `,
    className: '',
    iconSize: [100, 100],
    iconAnchor: [50, 50]
  }),
  interactive: false,
  pane: 'backgroundPane'
}).addTo(map);

// ---------- Town Creation ----------
function createTownIcon(data){
  const size = 40;
  const iconURL = data.image || "./images/town.png"; //default to town.png incase of no image
  return L.divIcon({
    className: "",
    html: `
      <div class="townMarker">
        <img src="${iconURL}" style="width:${size}px; height:auto;">
        <div class="townLabel">${data.name}</div>
      </div>
    `,
     // weird issue with leaflet and zooming affecting entire dom dont have a fix for this yet... 
     // fixed map size for the moment till ive resolved it, basically you zoom in and as you zooming the icon constantly gets smaller
     // but im sure its to do with leaflet so maybe i need to look here and modify the rendering

    iconSize: [size, size + 20],
    iconAnchor: [size/2, size/2]
  });
}

// ---------- ADD MARKERS ----------
function addMarker(data){
  const marker = L.marker([data.y, data.x], { icon: createTownIcon(data), data: data }).addTo(map);
  if(!data.goods){
    data.goods = {};
    goodsList.forEach(good => data.goods[good] = 0);
  }
  marker.on("click", () => {
    if(debugEnabled){
      showGoodsForm(data);
    }else{
        showGoodsData(data);
    }
  });

  
}

markers.forEach(addMarker);


// --- GOODS ------

const goodsList = [
  "Sugar", "Paprika", "Silk", "Mango", "Leather", "Nuts", "Oil", "Beer",
  "Cinnamon", "Rugs", "Tobacco", "Pepper", "Wine", "Grog", "Saffron",
  "Salt", "Dates", "Coffee", "Vanilla", "Pineapples"
];

const goodsMeta = {
  Sugar:    { weight: 20, value: 30, spoils: false },
  Paprika:  { weight: 9,  value: 15, spoils: false  },
  Silk:     { weight: 20,  value: 52, spoils: false },
  Mango:    { weight: 4,  value: 11, spoils: true  },
  Leather:  { weight: 5, value: 20, spoils: false },
  Nuts:     { weight: 5,  value: 9, spoils: false  },
  Oil:      { weight: 3, value: 13, spoils: false },
  Beer:     { weight: 6,  value: 5, spoils: false  },
  Cinnamon: { weight: 7,  value: 23, spoils: false },
  Rugs:     { weight: 6, value: 24, spoils: false },
  Tobacco:  { weight: 14,  value: 32, spoils: false  },
  Pepper:   { weight: 6,  value: 21, spoils: false },
  Wine:     { weight: 3,  value: 9, spoils: false  },
  Grog:     { weight: 5,  value: 9, spoils: true  },
  Saffron:  { weight: 15, value: 37, spoils: false },
  Salt:     { weight: 5,  value: 18, spoils: false },
  Dates:    { weight: 6,  value: 8, spoils: true  },
  Coffee:   { weight: 12,  value: 25, spoils: false  },
  Vanilla:  { weight: 7,  value: 22, spoils: false  },
  Pineapples:{ weight: 4, value: 11, spoils: true }
};


// handles map moving and highlighting of town user clicks 📍
function highlightTownMarker(town) {
  const marker = map.eachLayer(layer => {
    if(layer.options?.data?.name === town.name){
      if(highlightedMarker){
        highlightedMarker.getElement().style.filter = ""; // reset previous so not multiple highlightted
      }
      map.panTo(layer.getLatLng());
      const el = layer.getElement();
      if(el){
        el.style.filter = "drop-shadow(0 0 15px limegreen)";
      }
      highlightedMarker = layer;
    }
  });
}

// display goods data filtered by highest priced town
function showGoodsData(town){
  const container = document.getElementById("goodsFormContainer");

  container.innerHTML = `
    <h3>${town.name} Goods Details</h3>

    <div style="margin-bottom:10px;">
      <button onclick="showGoodsTab('tradeTab')">Trade Price In Town</button>
      <button onclick="showGoodsTab('sellTab')">Better Sell Locations</button>
      <button onclick="showGoodsTab('itemTab')">Find Item Location</button>
    </div>

    <div id="tradeTab"></div>
    <div id="sellTab" style="display:none;"></div>
    <div id="itemTab" style="display:none;"></div>
  `;

  const tradeContainer = document.getElementById("tradeTab");
  const sellContainer = document.getElementById("sellTab");
  const itemContainer = document.getElementById("itemTab");

  // -----------------------------
  // Better Sell Locations Table
  // -----------------------------
  let betterSellHTML = `<h4>Better Sell Locations</h4>`;
  betterSellHTML += `
    <table border="1" cellspacing="0" cellpadding="5">
      <tr><th>Good</th><th>Towns With Higher Price</th></tr>
  `;

  goodsList.forEach(good => {

    const betterTowns = towns
      .filter(t => t.name !== town.name && t.goods && t.goods[good] > town.goods[good]);

    if (betterTowns.length === 0) {
      betterSellHTML += `<tr><td>${good}</td><td>-</td></tr>`;
      return;
    }

    const prices = [...new Set(betterTowns.map(t => t.goods[good]))]
      .sort((a, b) => b - a);

    const highest = prices[0];
    const secondHighest = prices[1];

    const filteredTowns = betterTowns.filter(
      t => t.goods[good] === highest || t.goods[good] === secondHighest
    );

    const townsString = filteredTowns
      .sort((a, b) => b.goods[good] - a.goods[good])
      .map(t => {

        let color = "orange";
        if (t.goods[good] === highest) color = "green";

        return `<span style="color:${color};">
                  <span class="townIcon" data-town="${t.name}" style="cursor:pointer;margin-right:4px;">📍</span>
                  ${t.name} (${t.goods[good]})
                </span>`;

      }).join(", ");

    betterSellHTML += `<tr><td>${good}</td><td>${townsString}</td></tr>`;
  });

  betterSellHTML += `</table>`;
  sellContainer.innerHTML = betterSellHTML;

  // ----------------------------- 
  // Find Specific Item
  // -----------------------------

  let itemHtml = `
    <h4> Find Item Location</h4>
    <label> Select Item: </label>
    <select id="itemSelector">
      <option value="">-- select goods -- </option>
      ${goodsList.map(g => `<option value="${g}">${g}</option>`).join("")}
    </select>

    <div id="itemResults" style="margin-top:10px;"></div>
  `;

  itemContainer.innerHTML = itemHtml;

  // -----------------------------
  // Trade Price Table
  // -----------------------------
  let tableHTML = `
    <h4>Trade Price In Town</h4>
    <table border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Good</th>
        <th>Price</th>
        <th>Weight</th>
        <th>Value</th>
        <th>Spoils?</th>
      </tr>
  `;

  goodsList.forEach(good => {

    const price = town.goods[good] || 0;
    const meta = goodsMeta[good];

    const prices = towns
      .map(t => t.goods?.[good])
      .filter(p => p && p > 0);

    const minPrice = Math.min(...prices);
    const maxPrice = Math.max(...prices);

    let priceDisplay = price;

    if (price === minPrice) {
      priceDisplay = `<span style="color:green;font-weight:bold">${price} (buy)</span>`;
    } 
    else if (price === maxPrice) {
      priceDisplay = `<span style="color:gold;font-weight:bold">${price} (sell)</span>`;
    }

    tableHTML += `
      <tr>
        <td>${good}</td>
        <td>${priceDisplay}</td>
        <td>${meta.weight}</td>
        <td>${meta.value}</td>
        <td style="color:${meta.spoils ? 'red' : 'inherit'}">
          ${meta.spoils ? "Yes" : "No"}
        </td>
      </tr>
    `;
  });

  tableHTML += `</table>`;
  tradeContainer.innerHTML = tableHTML;
}


function showItemLocations(good){

  const result = document.getElementById("itemResults");

  if(!good){
    results.innerHTML = "";
    return;
  }

  const townPrices = towns.filter(t => t.goods && t.goods[good] > 0).map(t => ({ 
      name: t.name,
      price: t.goods[good]

  }));


  townPrices.sort((a,b) => b.price - a.price );

  const highest = townPrices[0]?.price;
  const second =  townPrices[1]?.price;

  const bestTowns = townPrices.filter( t => t.price === highest || t.price === second  );

  let html = `
      <table border="1" cellspacing="0" cellpadding="5">
        <tr><th>Town</th><th>Price</th></tr>

  `;
    

  bestTowns.forEach(t => {

    let color = "orange";
    if (t.price === highest) color = "green";

    html += `
      <tr>
        <td>
          <span class="townIcon" data-town="${t.name}" style="curse:pointer; margin-right:4px">📍</span>
            ${t.name}
        </td>
      <tr>
      <td style="color:${color}"; font-weight:bold"> ${t.price}</td>
      </tr>
        
    `;

    html += "</table>"

    results.innerHTML = html;


  })

}



// handle click event for dropdown menu...

document.getElementById("itemSelector").addEventListener("change", function(){ 
              showItemLocations(this.value)
              })

// handle tabbing for the goods data display

window.showGoodsTab = function(tabId){
  console.log(tabId);
  document.getElementById("tradeTab").style.display = "none";
  document.getElementById("sellTab").style.display = "none";
  document.getElementById("itemTab").style.display = "none";

  document.getElementById(tabId).style.display = "block";
}


// function to help filter the array of towns and goods
function getBetterSellTowns(good, currentTown) {
  return towns.filter(t => t.name !== currentTown.name && t.goods && t.goods[good] > currentTown.goods[good]);
}

// ---------- CLICK TO ADD MARKER ----------
map.on("click", function(e){
  if(debugEnabled){
    const x = Math.round(e.latlng.lng);
    const y = Math.round(e.latlng.lat);

    const name = prompt("Town name?");
    if(!name) return;

    const image = prompt("Icon image URL (optional)");

    const data = {name, x, y};
    if(image) data.image = image;

    markers.push(data);
    addMarker(data);
  }

  
});

/// DEBUG EDIT PRICES OF TOWN
function showGoodsForm(town){
  selectedTown = town;

  const container = document.getElementById("goodsFormContainer");
  container.innerHTML = `<h3>${town.name} Goods Prices</h3>`;

  goodsList.forEach(good => {
    const value = town.goods ? town.goods[good] : 0;
    const inputHTML = `
      <label>${good}: <input type="number" data-good="${good}" value="${value}" style="width: 80px;"></label><br>
    `;
    container.innerHTML += inputHTML;
  });

  container.innerHTML += `<button id="saveGoodsBtn">Save Prices</button>`;

  document.getElementById("saveGoodsBtn").onclick = () => {
    town.goods = {};
    goodsList.forEach(good => {
      const input = container.querySelector(`input[data-good="${good}"]`);
      town.goods[good] = parseFloat(input.value) || 0;
    });
    alert(`Goods updated for ${town.name}`);
  };
}


// ---------- EXPORT DATA ----------
function exportMarkers(){
  if(!debugEnabled) return;
  document.getElementById("output").value = JSON.stringify(markers, null, 2);
}

document.getElementById("exportBtn").addEventListener("click", exportMarkers);

// event listener for handling click of 📍

document.getElementById("goodsFormContainer").addEventListener("click", (e) => {
  if(e.target && e.target.classList.contains("townIcon")){
    const townName = e.target.getAttribute("data-town");
    const townObj = towns.find(t => t.name === townName);
    if(townObj) highlightTownMarker(townObj);
  }
});
