// ---------- Town Creation ----------
function createTownIcon(data){
  const size = 40;
  const iconURL = data.image || "./images/town.png"; //default to town.png incase of no image
  return L.divIcon({
    className: "",
    html: `
      <div class="townMarker">
        <img src="${iconURL}" style="width:${size}px; height:auto;">
        <div class="townLabel">${data.name}</div>
      </div>
    `,
     // weird issue with leaflet and zooming affecting entire dom dont have a fix for this yet... 
     // fixed map size for the moment till ive resolved it, basically you zoom in and as you zooming the icon constantly gets smaller
     // but im sure its to do with leaflet so maybe i need to look here and modify the rendering

    iconSize: [size, size + 20],
    iconAnchor: [size/2, size/2]
  });
}

// ---------- ADD MARKERS ----------
function addMarker(data){
  const marker = L.marker([data.y, data.x], { icon: createTownIcon(data), data: data }).addTo(map);
  if(!data.goods){

  marker.on("click", () => {
    if(debugEnabled){
      showGoodsForm(data);
    }else{

        showGoodsData(data);
    }
  });

  
}

// handles map moving and highlighting of town user clicks 📍
function highlightTownMarker(town) {
  const marker = map.eachLayer(layer => {
    if(layer.options?.data?.name === town.name){
      if(highlightedMarker){
        highlightedMarker.getElement().style.filter = ""; // reset previous so not multiple highlightted
      }
      map.panTo(layer.getLatLng());
      const el = layer.getElement();
      if(el){
        el.style.filter = "drop-shadow(0 0 15px limegreen)";
      }
      highlightedMarker = layer;
    }
  });
}

// display goods data filtered by highest priced town
function showGoodsData(town){
  const container = document.getElementById("goodsFormContainer");

  container.innerHTML = `
    <h3>${town.name} Goods Details</h3>

    <div style="margin-bottom:10px;">
      <button onclick="showGoodsTab('tradeTab')">Trade Price In Town</button>
      <button onclick="showGoodsTab('sellTab')">Better Sell Locations</button>
    </div>

    <div id="tradeTab"></div>
    <div id="sellTab" style="display:none;"></div>
  `;

  const tradeContainer = document.getElementById("tradeTab");
  const sellContainer = document.getElementById("sellTab");

  // -----------------------------
  // Better Sell Locations Table
  // -----------------------------
  let betterSellHTML = `<h4>Better Sell Locations</h4>`;
  betterSellHTML += `
    <table border="1" cellspacing="0" cellpadding="5">
      <tr><th>Good</th><th>Towns With Higher Price</th></tr>
  `;

  goodsList.forEach(good => {

    const betterTowns = towns
      .filter(t => t.name !== town.name && t.goods && t.goods[good] > town.goods[good]);

    if (betterTowns.length === 0) {
      betterSellHTML += `<tr><td>${good}</td><td>-</td></tr>`;
      return;
    }

    const prices = [...new Set(betterTowns.map(t => t.goods[good]))]
      .sort((a, b) => b - a);

    const highest = prices[0];
    const secondHighest = prices[1];

    const filteredTowns = betterTowns.filter(
      t => t.goods[good] === highest || t.goods[good] === secondHighest
    );

    const townsString = filteredTowns
      .sort((a, b) => b.goods[good] - a.goods[good])
      .map(t => {

        let color = "orange";
        if (t.goods[good] === highest) color = "green";

        return `<span style="color:${color};">
                  <span class="townIcon" data-town="${t.name}" style="cursor:pointer;margin-right:4px;">📍</span>
                  ${t.name} (${t.goods[good]})
                </span>`;

      }).join(", ");

    betterSellHTML += `<tr><td>${good}</td><td>${townsString}</td></tr>`;
  });

  betterSellHTML += `</table>`;
  sellContainer.innerHTML = betterSellHTML;


  // -----------------------------
  // Trade Price Table
  // -----------------------------
  let tableHTML = `
    <h4>Trade Price In Town</h4>
    <table border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Good</th>
        <th>Price</th>
        <th>Weight</th>
        <th>Value</th>
        <th>Spoils?</th>
      </tr>
  `;

  goodsList.forEach(good => {

    const price = town.goods[good] || 0;
    const meta = goodsMeta[good];

    const prices = towns
      .map(t => t.goods?.[good])
      .filter(p => p && p > 0);

    const minPrice = Math.min(...prices);
    const maxPrice = Math.max(...prices);

    let priceDisplay = price;

    if (price === minPrice) {
      priceDisplay = `<span style="color:green;font-weight:bold">${price} (buy)</span>`;
    } 
    else if (price === maxPrice) {
      priceDisplay = `<span style="color:gold;font-weight:bold">${price} (sell)</span>`;
    }

    tableHTML += `
      <tr>
        <td>${good}</td>
        <td>${priceDisplay}</td>
        <td>${meta.weight}</td>
        <td>${meta.value}</td>
        <td style="color:${meta.spoils ? 'red' : 'inherit'}">
          ${meta.spoils ? "Yes" : "No"}
        </td>
      </tr>
    `;
  });

  tableHTML += `</table>`;
  tradeContainer.innerHTML = tableHTML;
}

function showGoodsForm(town){
  selectedTown = town;

  const container = document.getElementById("goodsFormContainer");
  container.innerHTML = `<h3>${town.name} Goods Prices</h3>`;

  goodsList.forEach(good => {
    const value = town.goods ? town.goods[good] : 0;
    const inputHTML = `
      <label>${good}: <input type="number" data-good="${good}" value="${value}" style="width: 80px;"></label><br>
    `;
    container.innerHTML += inputHTML;
  });

  container.innerHTML += `<button id="saveGoodsBtn">Save Prices</button>`;

  document.getElementById("saveGoodsBtn").onclick = () => {
    town.goods = {};

      const input = container.querySelector(`input[data-good="${good}"]`);
      town.goods[good] = parseFloat(input.value) || 0;
    });
    alert(`Goods updated for ${town.name}`);
  };
}
